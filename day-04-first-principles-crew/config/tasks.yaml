challenge_task:
  description: >
    Problem: {problem}

    List every assumption baked into this problem statement. For each, mark
    whether it's questionable and explain why.
  expected_output: >
    At most 4 assumptions. Each statement and its why must be a single short
    sentence — punchy, no hedging.
  agent: skeptic

distill_task:
  description: >
    Using only the assumptions that survive scrutiny, distill the irreducible
    fundamental truths relevant to: {problem}
  expected_output: >
    3 to 4 fundamental truths. Each truth and its basis must be a single short
    sentence.
  agent: physicist
  context:
    - challenge_task

build_task:
  description: >
    Using only the fundamentals, reconstruct one concrete recommendation for: {problem}
  expected_output: >
    One recommendation of at most two sentences, resting on at most 3
    fundamentals (quoted verbatim).
  agent: builder
  context:
    - challenge_task
    - distill_task
